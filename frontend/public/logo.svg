<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#A3E635"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <g stroke="#1F2937" stroke-width="1">
    <line x1="40"  y1="80"  x2="216" y2="80"/>
    <line x1="40"  y1="128" x2="216" y2="128"/>
    <line x1="40"  y1="176" x2="216" y2="176"/>
    <line x1="80"  y1="40"  x2="80"  y2="216"/>
    <line x1="128" y1="40"  x2="128" y2="216"/>
    <line x1="176" y1="40"  x2="176" y2="216"/>
  </g>

  <path d="M40 180 L72 150 L100 168 L132 110 L168 138 L200 70 L216 60 L216 200 L40 200 Z"
        fill="url(#fill)"/>

  <path d="M40 180 L72 150 L100 168 L132 110 L168 138 L200 70 L216 60"
        fill="none" stroke="url(#line)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <g fill="#0B1220" stroke="url(#line)" stroke-width="3">
    <circle cx="72"  cy="150" r="5"/>
    <circle cx="132" cy="110" r="5"/>
    <circle cx="200" cy="70"  r="5"/>
  </g>

</svg>
